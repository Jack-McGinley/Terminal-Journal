name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_name: journal-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            asset_name: journal-linux-arm64
          - os: macos-latest
            target: darwin-x64
            asset_name: journal-macos-x64
          - os: macos-latest
            target: darwin-arm64
            asset_name: journal-macos-arm64
          - os: windows-latest
            target: win32-x64
            asset_name: journal-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build ./src/index.js --compile --target=bun-${{ matrix.target }} --outfile=${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
